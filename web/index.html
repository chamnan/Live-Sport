<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>IPTV Sports Player</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>⚽</text></svg>"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/artplayer/dist/artplayer.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="toast-container"></div>
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>
    <div id="layout">
      <!-- SIDEBAR (Desktop) / DRAWER (Mobile) -->
      <div id="sidebar">
        <div id="sidebar-header">
          <div class="header-row">
            <button id="btn-menu" onclick="toggleSidebar()">☰</button>
            <div class="header-title">📺 IPTV Sports</div>
          </div>
        </div>
        <div id="sidebar-scroll">
          <div id="list"></div>
        </div>
      </div>
      <!-- PLAYER PANEL -->
      <div id="player-panel">
        <div id="player-container">
          <div id="match-overlay" style="display: none">
            <img
              id="overlay-home-logo"
              class="overlay-logo"
              src=""
              onerror="this.style.display = 'none'"
              style="display: none"
            />
            <span id="overlay-teams" class="overlay-teams"></span>
            <img
              id="overlay-away-logo"
              class="overlay-logo"
              src=""
              onerror="this.style.display = 'none'"
              style="display: none"
            />
            <span id="overlay-score" class="overlay-score"></span>
          </div>
          <div id="player"></div>
        </div>
        <!-- Mobile: match list below player -->
        <div id="mobile-match-list"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>
    <script src="app.js"></script>
  </body>
</html>
