<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IPTV Sports Player</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>⚽</text></svg>">

<link rel="stylesheet" href="https://unpkg.com/artplayer/dist/artplayer.css">

<style>
/* ===== CSS VARIABLES ===== */
:root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #e0e0e0;
    --text-dim: #888;
    --accent: #00e676;
    --accent-glow: rgba(0,230,118,0.15);
    --radius: 10px;
    --radius-sm: 6px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --sidebar-w: 340px;
    --header-h: 56px;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100dvh;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none;
    user-select: none;
}

/* ===== LAYOUT ===== */
#layout {
    display: flex;
    height: 100dvh;
}

/* ===== SIDEBAR (Desktop) ===== */
#sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    z-index: 20;
}

#sidebar-header {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

#sidebar-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
    -webkit-overflow-scrolling: touch;
}

/* ===== HEADER ROW ===== */
.header-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
}

#btn-menu {
    display: none;
    width: 36px;
    height: 36px;
    border: none;
    background: var(--surface2);
    color: var(--text);
    border-radius: var(--radius-sm);
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
}

.header-title {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.3px;
}

.btn-row {
    display: flex;
    gap: 6px;
    flex: 1;
}

.btn-row button {
    flex: 1;
    padding: 10px 6px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    transition: all 0.2s;
    font-family: var(--font);
    white-space: nowrap;
}

.btn-row button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
    box-shadow: 0 0 12px var(--accent-glow);
}

.btn-row button:active { transform: scale(0.96); }

#btn-reload:active { background: var(--accent); color: #000; }

#refresh-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

#btn-reload {
    padding: 6px 12px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font);
    transition: all 0.2s;
}

#btn-reload:active { background: var(--accent); color: #000; }

#refresh-indicator {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
}

#status {
    font-size: 11px;
    color: var(--accent);
    margin-top: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* ===== CATEGORIES & MATCHES ===== */
.category {
    margin-bottom: 8px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
}

.cat-title {
    padding: 10px 12px;
    background: var(--surface2);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
}

.cat-title:hover { background: #252525; }
.cat-title::after {
    content: '▾';
    margin-left: auto;
    font-size: 10px;
    transition: transform 0.2s;
    color: var(--text-dim);
}
.cat-title.collapsed::after { transform: rotate(-90deg); }

.date-accordion {
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    background: var(--surface);
}

.date-title {
    font-size: 14px;
    font-weight: 700;
    padding: 12px 14px;
    background: var(--accent-glow);
    color: var(--accent);
    letter-spacing: 0.3px;
}

.date-title::after {
    content: '▾';
    margin-left: auto;
    font-size: 12px;
    transition: transform 0.2s;
    color: var(--accent);
}

.date-title.collapsed::after { transform: rotate(-90deg); }

.group-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    padding: 6px 12px 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.match-time {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    min-width: 52px;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
}

.match {
    padding: 10px 12px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
}

.match:last-child { border-bottom: none; }
.match:hover { background: #252525; color: #fff; }
.match:active { background: var(--accent-glow); }
.match.active-match {
    background: var(--accent-glow);
    color: #fff;
    border-left: 3px solid var(--accent);
}

.team-logo {
    width: 22px;
    height: 22px;
    object-fit: contain;
    border-radius: 50%;
    background: #1a1a1a;
    flex-shrink: 0;
}

.match-teams {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.match-vs {
    color: #555;
    font-size: 10px;
    margin: 0 2px;
}

.match-score {
    font-weight: 700;
    color: #fff;
    font-size: 13px;
    min-width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
}

.match-live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* ===== PLAYER PANEL ===== */
#player-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
}

#player-container {
    flex: 1;
    position: relative;
    background: #000;
    min-height: 0;
}

#player {
    width: 100%;
    height: 100%;
}

/* ===== MATCH OVERLAY ===== */
#match-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 14px 16px;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    pointer-events: none;
}

#match-overlay .overlay-logo {
    width: 32px;
    height: 32px;
    object-fit: contain;
    border-radius: 50%;
    background: #1a1a1a;
    flex-shrink: 0;
}

#match-overlay .overlay-teams {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

#match-overlay .overlay-score {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    font-variant-numeric: tabular-nums;
}

/* ===== MOBILE ACTION BAR (hidden on desktop) ===== */
#mobile-action-bar {
    display: none;
    padding: 10px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
}

#mobile-action-bar .ma-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
}

#mobile-action-bar .ma-row button {
    flex: 1;
    padding: 8px 4px;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-weight: 500;
    font-family: var(--font);
    white-space: nowrap;
    transition: all 0.2s;
}

#mobile-action-bar .ma-row button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
}

#mobile-action-bar .ma-row button:active { transform: scale(0.96); }

#mobile-action-bar .ma-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

#mobile-action-bar .ma-status {
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
}

#mobile-action-bar .ma-refresh {
    font-size: 11px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
}

/* ===== MOBILE MATCH LIST (hidden on desktop) ===== */
#mobile-match-list {
    display: none;
}

/* ===== MOBILE NAV (hidden on desktop) ===== */
#mobile-nav {
    display: none;
    height: var(--header-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    align-items: center;
    justify-content: space-around;
    padding: 0 8px;
}

#mobile-nav button {
    flex: 1;
    height: 100%;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    font-family: var(--font);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    transition: color 0.2s;
}

#mobile-nav button .nav-icon { font-size: 18px; }
#mobile-nav button.active { color: var(--accent); }

/* ===== MOBILE SIDEBAR OVERLAY ===== */
#sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 25;
}

/* ===== SCROLLBAR ===== */
#sidebar-scroll::-webkit-scrollbar { width: 4px; }
#sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
#sidebar-scroll::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

/* ===== EMPTY STATE ===== */
.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }

/* ===== TOAST NOTIFICATIONS ===== */
#toast-container {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    pointer-events: none;
}

.toast {
    pointer-events: auto;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    font-family: var(--font);
    color: #fff;
    background: rgba(30,30,30,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1), toastOut 0.25s cubic-bezier(0.16, 1, 0.3, 1) 2.5s forwards;
    max-width: 90vw;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.toast.error {
    border-color: #ff5252;
    background: rgba(40,15,15,0.95);
}

.toast.warn {
    border-color: #ffab40;
    background: rgba(40,30,10,0.95);
}

.toast.info {
    border-color: var(--accent);
    background: rgba(10,30,20,0.95);
}

.toast-icon {
    font-size: 16px;
    flex-shrink: 0;
}

@keyframes toastIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toastOut {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to   { opacity: 0; transform: translateY(-12px) scale(0.95); }
}

/* ===================== */
/* =====  RESPONSIVE ===== */
/* ===================== */

/* Tablet */
@media (max-width: 1024px) {
    :root { --sidebar-w: 300px; }
}

/* Mobile */
@media (max-width: 767px) {
    :root {
        --sidebar-w: 100%;
        --header-h: 52px;
    }

    #layout { flex-direction: column; }

    /* Sidebar becomes a left drawer */
    #sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 85vw;
        max-width: 360px;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        border-right: 1px solid var(--border);
        border-radius: 0 var(--radius) var(--radius) 0;
        box-shadow: 4px 0 30px rgba(0,0,0,0.5);
    }

    #sidebar.open { transform: translateX(0); }

    #sidebar-overlay.show { display: block; }

    #btn-menu { display: flex; }

    /* Player panel is full width */
    #player-panel {
        flex: 1;
    }

    /* Player takes proportionate height */
    #player-container {
        flex: 0 0 auto;
        height: 35vh;
        min-height: 200px;
    }

    /* Match overlay smaller on mobile */
    #match-overlay {
        padding: 10px 12px;
    }

    #match-overlay .overlay-logo {
        width: 24px;
        height: 24px;
    }

    #match-overlay .overlay-teams {
        font-size: 13px;
    }

    #match-overlay .overlay-score {
        font-size: 16px;
    }

    /* Mobile action bar */

    #mobile-action-bar { display: flex; flex-direction: column; }

    /* Mobile match list below player */
    #mobile-match-list {
        display: block;
        flex: 1;
        overflow-y: auto;
        background: var(--surface);
        -webkit-overflow-scrolling: touch;
    }

    #mobile-match-list .category {
        margin: 6px 8px;
    }

    /* Mobile nav bar */
    #mobile-nav { display: flex; }

    /* Hide desktop sidebar scroll (matches go in mobile-match-list) */
    #sidebar-scroll { display: none; }

    /* Header compact */
    #sidebar-header { padding: 10px; }

    /* Larger tap targets */
    .match { padding: 12px; }
    .cat-title { padding: 12px; }
}

/* Landscape phone */
@media (max-width: 767px) and (orientation: landscape) {
    #player-container { height: 55vh; }
}

/* Very small screens */
@media (max-width: 380px) {
    .btn-row button { font-size: 11px; padding: 8px 4px; }
    #match-overlay .overlay-teams { font-size: 12px; }
}
</style>
</head>

<body>

<div id="toast-container"></div>

<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="layout">

    <!-- SIDEBAR (Desktop) / DRAWER (Mobile) -->
    <div id="sidebar">
        <div id="sidebar-header">
            <div class="header-row">
                <button id="btn-menu" onclick="toggleSidebar()">☰</button>
                <div class="header-title">📺 IPTV Sports</div>
            </div>
        </div>
        <div id="sidebar-scroll">
            <div id="list"></div>
        </div>
    </div>

    <!-- PLAYER PANEL -->
    <div id="player-panel">
        <div id="player-container">
            <div id="match-overlay" style="display:none;">
                <img id="overlay-home-logo" class="overlay-logo" src="" onerror="this.style.display='none'" style="display:none;">
                <span id="overlay-teams" class="overlay-teams"></span>
                <img id="overlay-away-logo" class="overlay-logo" src="" onerror="this.style.display='none'" style="display:none;">
                <span id="overlay-score" class="overlay-score"></span>
            </div>
            <div id="player"></div>
        </div>

        <!-- Mobile: match list below player -->
        <div id="mobile-match-list"></div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://unpkg.com/artplayer/dist/artplayer.js"></script>

<script>

// ===== STATE =====
let art = null;
let hls = null;
let activeMatchId = null;
let isMobile = window.innerWidth < 768;

// Suppress all unhandled promise rejections from Artplayer's internal play() calls
window.addEventListener('unhandledrejection', (e) => {
    e.preventDefault();
});

// ===== UTILS =====
function formatDisplayDate(yyyymmdd) {
    const y = yyyymmdd.slice(0, 4);
    const m = yyyymmdd.slice(4, 6);
    const d = yyyymmdd.slice(6, 8);
    const date = new Date(y, m - 1, d);
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const diff = Math.round((date - today) / 86400000);
    const label = diff === -1 ? '📅 Yesterday' : diff === 0 ? '📅 Today' : diff === 1 ? '📅 Tomorrow' : yyyymmdd;
    return label + ' — ' + d + '/' + m + '/' + y;
}

// ===== TOAST =====
function showToast(msg, type) {
    type = type || 'info';
    const icons = { error: '⚠️', warn: '🔔', info: 'ℹ️' };
    const container = document.getElementById('toast-container');

    const toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.innerHTML = '<span class="toast-icon">' + (icons[type] || '') + '</span>' + msg;

    // Remove after animation ends (3s total)
    toast.addEventListener('animationend', function(e) {
        if (e.animationName === 'toastOut') toast.remove();
    });

    container.appendChild(toast);

    // Limit to 3 toasts at a time
    while (container.children.length > 3) {
        container.firstChild.remove();
    }
}

// ===== MOBILE HELPERS =====
function isMobileDevice() {
    return window.innerWidth < 768;
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const open = !sidebar.classList.contains('open');
    sidebar.classList.toggle('open', open);
    overlay.classList.toggle('show', open);
}

function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-overlay').classList.remove('show');
}

// ===== TIME FORMATTING =====
function formatMatchTime(raw) {
    if (raw == null || raw === '') return '';
    let h, m;
    // Unix timestamp (seconds or milliseconds)
    if (typeof raw === 'number') {
        const d = raw > 1e12 ? new Date(raw) : new Date(raw * 1000);
        h = d.getHours();
        m = d.getMinutes();
    } else {
        const str = String(raw);
        // ISO date string like "2026-06-29T14:30:00"
        const isoMatch = str.match(/T(\d{2}):(\d{2})/);
        if (isoMatch) {
            h = parseInt(isoMatch[1], 10);
            m = parseInt(isoMatch[2], 10);
        } else {
            // Plain time like "14:30" or "14:30:00"
            const parts = str.split(':');
            h = parseInt(parts[0], 10);
            m = parseInt(parts[1], 10);
            if (isNaN(h) || isNaN(m)) return '';
        }
    }
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    const mm = String(m).padStart(2, '0');
    return h12 + ':' + mm + ' ' + ampm;
}

// ===== PLAYER =====
function destroyPlayer() {
    if (hls) { hls.destroy(); hls = null; }
    if (art) { art.destroy(false); art = null; }
    hideOverlay();
}

function showOverlay(homeName, awayName, homeLogo, awayLogo, scoreStr) {
    const overlay = document.getElementById('match-overlay');
    overlay.style.display = 'flex';

    const homeImg = document.getElementById('overlay-home-logo');
    homeImg.src = homeLogo || '';
    homeImg.style.display = homeLogo ? 'block' : 'none';

    const awayImg = document.getElementById('overlay-away-logo');
    awayImg.src = awayLogo || '';
    awayImg.style.display = awayLogo ? 'block' : 'none';

    document.getElementById('overlay-teams').innerText = homeName + '  vs  ' + awayName;
    document.getElementById('overlay-score').innerText = scoreStr || '';
}

function hideOverlay() {
    document.getElementById('match-overlay').style.display = 'none';
}

/**
 * PLAY STREAM
 */
async function play(streamUrl, matchId, home, away, homeLogo, awayLogo, scoreStr) {
    const pr = await fetch(
        `/api/play-url?u=${encodeURIComponent(streamUrl)}&matchId=${matchId}&home=${encodeURIComponent(home)}&away=${encodeURIComponent(away)}`
    );
    const pj = await pr.json();

    if (!pj.url) return;

    destroyPlayer();

    art = new Artplayer({
        container: '#player',
        url: pj.url,
        isLive: true,
        autoplay: true,
        muted: true,
        autoMini: true,
        fullscreen: true,
        flip: true,
        playbackRate: true,
    });

    showOverlay(home, away, homeLogo, awayLogo, scoreStr);
}

// ===== DATA LOADING =====
async function loadMatches() {
    const res = await fetch('/api/matches');
    const json = await res.json();
    const result = json.result || {};
    const days = json.days || Object.keys(result).sort();

    // Build a map: day -> normalized groups with dedup
    const dayGroups = {};

    days.forEach(day => {
        let data = result[day];
        if (!data || data.error) return;

        // Unwrap extra .data wrapper if present
        if (data.data && typeof data.data === 'object' && !Array.isArray(data.data)) {
            data = data.data;
        }

        const groups = normalizeGroups(data);
        // Ensure living_group (🔴) always takes priority during dedup
        groups.sort((a, b) => {
            const aLive = a.title.startsWith('🔴') ? 1 : 0;
            const bLive = b.title.startsWith('🔴') ? 1 : 0;
            return bLive - aLive; // living groups sort first
        });
        // Dedup: track seen competition names + match IDs per day
        const seenComp = new Set();
        const seenMatch = new Set();
        const deduped = [];

        groups.forEach(g => {
            const compKey = g.competitionName || g.title;
            if (seenComp.has(compKey)) return; // skip duplicate competition
            seenComp.add(compKey);

            // Filter items by deduplicating match IDs inside match arrays
            const uniqueItems = g.items.filter(item => {
                const matchArr = item.match;
                if (!Array.isArray(matchArr) || matchArr.length === 0) return true;

                // Keep only matches whose IDs haven't been seen
                const uniqueMatches = matchArr.filter(m => {
                    if (!m || !m.id) return true;
                    if (seenMatch.has(m.id)) return false;
                    seenMatch.add(m.id);
                    return true;
                });

                if (uniqueMatches.length === 0) {
                    // All matches were duplicates — drop this item entirely
                    return false;
                }

                // Mutate item to only contain unique matches
                item.match = uniqueMatches;
                return true;
            });

            if (uniqueItems.length > 0) {
                deduped.push({ ...g, items: uniqueItems });
            }
        });

        if (deduped.length > 0) {
            dayGroups[day] = deduped;
        }
    });

    render(dayGroups, days);

    // Update overlay for currently playing match (scores may have changed)
    if (activeMatchId && document.getElementById('match-overlay').style.display === 'flex') {
        updateActiveMatchOverlay(dayGroups);
    }
}

function updateActiveMatchOverlay(dayGroups) {
    for (const day of Object.keys(dayGroups)) {
        for (const group of dayGroups[day]) {
            for (const item of group.items) {
                const matches = item.match || (item.competition && item.competition.match) || [];
                for (const m of matches) {
                    if (m && m.id === activeMatchId && m.home_team && m.away_team) {
                        const homeName = m.home_team.name_en || m.home_team.name || '?';
                        const awayName = m.away_team.name_en || m.away_team.name || '?';
                        const homeLogo = m.home_team.logo || '';
                        const awayLogo = m.away_team.logo || '';
                        const homeScore = (m.home_scores && m.home_scores[0] != null) ? m.home_scores[0] : '';
                        const awayScore = (m.away_scores && m.away_scores[0] != null) ? m.away_scores[0] : '';
                        const scoreStr = (homeScore !== '' && awayScore !== '') ? `${homeScore} - ${awayScore}` : '';
                        showOverlay(homeName, awayName, homeLogo, awayLogo, scoreStr);
                        return;
                    }
                }
            }
        }
    }
}

function normalizeGroups(data) {
    const groups = [];

    (data.living_group || []).forEach(g => {
        groups.push({
            title: '🔴 ' + (g.competition?.name_en || 'Live'),
            competitionName: g.competition?.name_en || '',
            items: [{ competition: g.competition, match: g.match }]
        });
    });

    (data.obs_group || []).forEach(g => {
        groups.push({
            title: g.competition?.name_en || '',
            competitionName: g.competition?.name_en || '',
            items: [{ competition: g.competition, match: g.match }]
        });
    });

    (data.hot_group || []).forEach(g => {
        groups.push({
            title: g.competition?.name_en || '',
            competitionName: g.competition?.name_en || '',
            items: [{ competition: g.competition, match: g.match }]
        });
    });

    (data.category_group || []).forEach(g => {
        groups.push({
            title: g.name,
            competitionName: g.name,
            items: g.competition_match || []
        });
    });

    (data.country_group || []).forEach(g => {
        groups.push({
            title: g.country?.name || g.name,
            competitionName: g.country?.name || g.name || '',
            items: g.competition_match || []
        });
    });

    (data.other_group || []).forEach(g => {
        groups.push({
            title: g.competition?.name_en || '',
            competitionName: g.competition?.name_en || '',
            items: [{ competition: g.competition, match: g.match }]
        });
    });

    return groups;
}

// ===== RENDER =====
function buildMatchElement(m, homeName, awayName, homeLogo, awayLogo, scoreStr, matchTime, isLive) {
    const el = document.createElement("div");
    el.className = "match";
    if (m.id === activeMatchId) el.classList.add('active-match');

    if (isLive) {
        const dot = document.createElement("span");
        dot.className = "match-live-dot";
        el.appendChild(dot);
    }

    if (matchTime) {
        const timeSpan = document.createElement("span");
        timeSpan.className = "match-time";
        timeSpan.innerText = matchTime;
        el.appendChild(timeSpan);
    }

    if (homeLogo) {
        const img = document.createElement("img");
        img.className = "team-logo";
        img.src = homeLogo;
        img.onerror = () => { img.style.display = 'none'; };
        el.appendChild(img);
    }

    const teamsSpan = document.createElement("span");
    teamsSpan.className = "match-teams";
    teamsSpan.innerHTML = homeName + '<span class="match-vs"> vs </span>' + awayName;
    el.appendChild(teamsSpan);

    if (awayLogo) {
        const img = document.createElement("img");
        img.className = "team-logo";
        img.src = awayLogo;
        img.onerror = () => { img.style.display = 'none'; };
        el.appendChild(img);
    }

    if (scoreStr) {
        const scoreSpan = document.createElement("span");
        scoreSpan.className = "match-score";
        scoreSpan.innerText = scoreStr;
        el.appendChild(scoreSpan);
    }

    return el;
}

function attachMatchClick(el, m, homeName, awayName, homeLogo, awayLogo, scoreStr) {
    el.onclick = async () => {
        document.querySelectorAll('.match.active-match').forEach(e => e.classList.remove('active-match'));
        el.classList.add('active-match');
        activeMatchId = m.id;

        showToast('Loading stream for ' + homeName + ' vs ' + awayName + '…', 'info');

        const r = await fetch(`/api/stream/${m.id}`);
        const s = await r.json();

        if (!s.streamUrl) {
            showToast('No stream available for ' + homeName + ' vs ' + awayName, 'warn');
            return;
        }

        play(s.streamUrl, m.id, homeName, awayName, homeLogo, awayLogo, scoreStr);

        if (isMobileDevice()) {
            closeSidebar();
        }
    };
}

function renderGroup(cat) {
    const catDiv = document.createElement("div");
    catDiv.className = "category";

    const title = document.createElement("div");
    title.className = "cat-title";
    title.innerText = cat.title || 'Unknown';

    const body = document.createElement("div");
    body.className = "cat-body";

    title.onclick = () => {
        body.style.display = body.style.display === "none" ? "block" : "none";
        title.classList.toggle('collapsed', body.style.display === "none");
    };

    const items = cat.items || [];

    items.forEach(comp => {
        if (!comp || !comp.competition) return;

        const groupTitle = document.createElement("div");
        groupTitle.className = "group-title";
        groupTitle.innerText = comp.competition.name_en || comp.competition.name || '';
        body.appendChild(groupTitle);

        const isLiveGroup = cat.title.startsWith('🔴');

        const matches = comp.match || comp.competition.match || [];
        matches.forEach(m => {
            if (!m || !m.home_team || !m.away_team) return;

            const homeName = m.home_team.name_en || m.home_team.name || '?';
            const awayName = m.away_team.name_en || m.away_team.name || '?';
            const homeLogo = m.home_team.logo || '';
            const awayLogo = m.away_team.logo || '';
            const homeScore = (m.home_scores && m.home_scores[0] != null) ? m.home_scores[0] : '';
            const awayScore = (m.away_scores && m.away_scores[0] != null) ? m.away_scores[0] : '';
            const scoreStr = (homeScore !== '' && awayScore !== '') ? `${homeScore} - ${awayScore}` : '';
            const matchTime = formatMatchTime(m.match_time);

            const el = buildMatchElement(m, homeName, awayName, homeLogo, awayLogo, scoreStr, matchTime, isLiveGroup);
            attachMatchClick(el, m, homeName, awayName, homeLogo, awayLogo, scoreStr);
            body.appendChild(el);
        });
    });

    catDiv.appendChild(title);
    catDiv.appendChild(body);
    return catDiv;
}

function renderDateAccordion(day, groups) {
    const container = document.createElement("div");
    container.className = "category date-accordion";

    const header = document.createElement("div");
    header.className = "cat-title date-title";
    header.innerText = formatDisplayDate(day);

    const body = document.createElement("div");
    body.className = "cat-body";

    // Start expanded for today
    const todayStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const isToday = day === todayStr;
    if (!isToday) {
        body.style.display = "none";
        header.classList.add('collapsed');
    }

    header.onclick = () => {
        body.style.display = body.style.display === "none" ? "block" : "none";
        header.classList.toggle('collapsed', body.style.display === "none");
    };

    groups.forEach(cat => {
        const catDiv = renderGroup(cat);
        body.appendChild(catDiv);
    });

    container.appendChild(header);
    container.appendChild(body);
    return container;
}

function render(dayGroups, days) {
    const desktopList = document.getElementById("list");
    const mobileList = document.getElementById("mobile-match-list");
    desktopList.innerHTML = "";
    mobileList.innerHTML = "";

    const orderedDays = days || Object.keys(dayGroups).sort();
    let hasContent = false;

    orderedDays.forEach(day => {
        const groups = dayGroups[day];
        if (!groups || groups.length === 0) return;
        hasContent = true;

        const desktopAcc = renderDateAccordion(day, groups);
        const mobileAcc = renderDateAccordion(day, groups);
        desktopList.appendChild(desktopAcc);
        mobileList.appendChild(mobileAcc);
    });

    if (!hasContent) {
        const empty = '<div class="empty-state"><div class="empty-icon">📭</div><div>No matches found</div></div>';
        desktopList.innerHTML = empty;
        mobileList.innerHTML = empty;
    }
}

// ===== RESIZE HANDLER =====
window.addEventListener('resize', () => {
    const wasMobile = isMobile;
    isMobile = isMobileDevice();

    if (wasMobile && !isMobile) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
        document.getElementById('player-container').style.flex = '';
        document.getElementById('player-container').style.height = '';
        document.getElementById('mobile-match-list').style.display = '';
    }
});

// ===== SWIPE TO CLOSE (MOBILE) =====
let touchStartX = 0;
document.getElementById('sidebar').addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
}, { passive: true });

document.getElementById('sidebar').addEventListener('touchmove', (e) => {
    const dx = e.touches[0].clientX - touchStartX;
    if (dx < -50) {
        closeSidebar();
    }
}, { passive: true });

// ===== INIT =====
loadMatches();
setInterval(loadMatches, 30000);
</script>
